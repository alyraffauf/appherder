name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Install release tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq binutils zsync

      - name: Build release payload
        run: |
          set -euo pipefail

          export APPHERDER_RELEASE_VERSION="$GITHUB_REF_NAME"
          export APPHERDER_RELEASE_SYSTEM="x86_64-linux"

          nix build --impure --out-link result-appherder --expr '
          let
            flake = builtins.getFlake (toString ./.);
            pkgs = import flake.inputs.nixpkgs {
              system = builtins.getEnv "APPHERDER_RELEASE_SYSTEM";
              config.allowUnfree = true;
            };
          in
            pkgs.callPackage ./package.nix {
              version = builtins.getEnv "APPHERDER_RELEASE_VERSION";
            }
          '

          mkdir -p AppDir/usr/bin

          # Copy the real Go binary, not the Nix PATH wrapper.
          if [ -x result-appherder/bin/.appherder-wrapped ]; then
            install -Dm755 result-appherder/bin/.appherder-wrapped AppDir/usr/bin/appherder
            install -Dm755 result-appherder/bin/.appherder-wrapped appherder-linux-amd64
          else
            install -Dm755 result-appherder/bin/appherder AppDir/usr/bin/appherder
            install -Dm755 result-appherder/bin/appherder appherder-linux-amd64
          fi

          ./appherder-linux-amd64 --version | grep -F "appherder version $GITHUB_REF_NAME"

          # Bundle dwarfsextract so DwarFS AppImages do not need host tools.
          nix build --impure --out-link result-dwarfs --expr '
          let
            flake = builtins.getFlake (toString ./.);
            pkgs = import flake.inputs.nixpkgs {
              system = builtins.getEnv "APPHERDER_RELEASE_SYSTEM";
              config.allowUnfree = true;
            };
          in
            pkgs.dwarfs
          '
          install -Dm755 result-dwarfs/bin/dwarfsextract AppDir/usr/bin/dwarfsextract
          test "$(PATH="$PWD/AppDir/usr/bin:$PATH" command -v dwarfsextract)" = "$PWD/AppDir/usr/bin/dwarfsextract"
          AppDir/usr/bin/dwarfsextract --help >/dev/null

          # AppRun
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          export PATH="$HERE/usr/bin:$PATH"
          exec "$HERE/usr/bin/appherder" "$@"
          EOF

          # Desktop entry
          cat > AppDir/appherder.desktop << EOF
          [Desktop Entry]
          Type=Application
          Name=AppHerder
          Comment=A shepherd for your AppImages
          Exec=appherder
          Icon=appherder
          Terminal=true
          Categories=Utility;
          X-AppImage-Version=$GITHUB_REF_NAME
          X-AppImage-Integrate=false
          EOF

          # Icon (minimal 256x256 PNG)
          python3 -c "
          import struct, zlib
          def chunk(t, d):
              c = t + d
              return struct.pack('>I', len(d)) + c + struct.pack('>I', zlib.crc32(c) & 0xFFFFFFFF)
          h = b'\x89PNG\r\n\x1a\n'
          h += chunk(b'IHDR', struct.pack('>IIBBBBB', 256, 256, 8, 2, 0, 0, 0))
          r = b''
          for _ in range(256):
              r += b'\x00'
              for _ in range(256):
                  r += bytes([85, 153, 204])
          h += chunk(b'IDAT', zlib.compress(r))
          h += chunk(b'IEND', b'')
          with open('AppDir/appherder.png', 'wb') as f:
              f.write(h)
          "

          chmod +x AppDir/AppRun

      - name: Build AppImage
        run: |
          set -euo pipefail

          APPIMAGE="appherder-$GITHUB_REF_NAME-x86_64.AppImage"
          UPDATE_INFO="gh-releases-zsync|alyraffauf|appherder|latest|appherder-*x86_64.AppImage.zsync"

          wget -q -O /tmp/appimagetool.AppImage \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /tmp/appimagetool.AppImage

          APPIMAGE_EXTRACT_AND_RUN=1 /tmp/appimagetool.AppImage \
            -u "$UPDATE_INFO" \
            AppDir "$APPIMAGE"

          test -f "$APPIMAGE"
          test -f "$APPIMAGE.zsync"
          readelf -p .upd_info "$APPIMAGE" | grep -F "$UPDATE_INFO"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            appherder-linux-amd64 \
            appherder-"$GITHUB_REF_NAME"-x86_64.AppImage \
            appherder-"$GITHUB_REF_NAME"-x86_64.AppImage.zsync \
            --generate-notes
